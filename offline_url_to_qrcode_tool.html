<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網址轉 QR Code 工具</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --primary: #111827;
      --danger: #b91c1c;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", "PingFang TC", sans-serif;
      padding: 24px;
    }
    .container {
      max-width: 860px;
      margin: 0 auto;
    }
    .card {
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(17,24,39,.08);
      padding: 24px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }
    .lead {
      margin: 0 0 20px;
      line-height: 1.7;
      color: #374151;
    }
    label {
      display: block;
      margin: 14px 0 8px;
      font-weight: 650;
    }
    input[type="text"], select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 180px 180px;
      gap: 12px;
      align-items: end;
    }
    @media (max-width: 780px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    button {
      appearance: none;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      cursor: pointer;
    }
    button.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .message {
      min-height: 24px;
      margin-top: 14px;
      color: var(--danger);
      font-size: 15px;
    }
    .preview {
      margin-top: 22px;
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      background: #fafafa;
    }
    #qrcodeWrap {
      display: inline-block;
      background: #fff;
      padding: 14px;
      border-radius: 14px;
      box-shadow: 0 4px 12px rgba(0,0,0,.04);
    }
    #qrcodeCanvas {
      display: block;
      max-width: 100%;
      height: auto;
    }
    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .note {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #f8fafc;
      color: #475569;
      line-height: 1.7;
      font-size: 14px;
    }
    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>離線網址轉 QR Code 工具</h1>
      <p class="lead">網址只會在你的瀏覽器本機處理，不需要上傳到外部網站。</p>

      <label for="urlInput">網址</label>
      <div class="grid">
        <div>
          <input id="urlInput" type="text" placeholder="例如：https://example.com 或 example.com" value="">
        </div>
        <div>
          <label for="sizeSelect">尺寸</label>
          <select id="sizeSelect">
            <option value="200">200 × 200</option>
            <option value="300" selected>300 × 300</option>
            <option value="500">500 × 500</option>
            <option value="1000">1000 × 1000</option>
            <option value="2000">2000 × 2000</option>
          </select>
        </div>
        <div>
          <label for="levelSelect">容錯級別</label>
          <select id="levelSelect">
            <option value="L">L</option>
            <option value="M" selected>M</option>
            <option value="Q">Q</option>
            <option value="H">H</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="generateBtn">產生 QR Code</button>
        <button id="downloadBtn" disabled>下載 PNG</button>
        <button id="clearBtn">清除</button>
      </div>

      <div class="message" id="message"></div>

      <div class="preview">
        <div id="qrcodeWrap">
          <canvas id="qrcodeCanvas" width="300" height="300" aria-label="QR Code 預覽"></canvas>
        </div>
        <div class="hint">產生後可直接下載 PNG。若輸入中文網址或特殊字元，程式會先標準化成瀏覽器可開啟的網址格式。</div>
      </div>

      <div class="note">
        這個工具使用內嵌的開源 QRCode for JavaScript 演算法（MIT License）。
      </div>
      <div class="meta">使用方式：把這個 HTML 檔存到你的電腦，之後雙擊打開即可長期使用。</div>
    </div>
  </div>

	if (num.length === undefined) {
		throw new Error(num.length + "/" + shift);
	}

	var offset = 0;

	while (offset < num.length && num[offset] === 0) {
		offset++;
	}

	this.num = new Array(num.length - offset + shift);
	for (var i = 0; i < num.length - offset; i++) {
		this.num[i] = num[i + offset];
	}
}

	get : function(index) {
		return this.num[index];
	},
	
	getLength : function() {
		return this.num.length;
	},
	
	multiply : function(e) {
	
		var num = new Array(this.getLength() + e.getLength() - 1);
	
		for (var i = 0; i < this.getLength(); i++) {
			for (var j = 0; j < e.getLength(); j++) {
				num[i + j] ^= QRMath.gexp(QRMath.glog(this.get(i) ) + QRMath.glog(e.get(j) ) );

		return new QRPolynomial(num, 0);

    const QRCode = require("./index");
    const QRErrorCorrectLevel = require("./QRErrorCorrectLevel");

    const urlInput = document.getElementById("urlInput");
    const sizeSelect = document.getElementById("sizeSelect");
    const levelSelect = document.getElementById("levelSelect");
    const generateBtn = document.getElementById("generateBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const clearBtn = document.getElementById("clearBtn");
    const message = document.getElementById("message");
    const canvas = document.getElementById("qrcodeCanvas");
    const ctx = canvas.getContext("2d");

    function resetCanvas(size) {
      canvas.width = size;
      canvas.height = size;
      canvas.style.width = Math.min(size, 420) + "px";
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, size, size);
    }

    function normalizeUrl(value) {
      const trimmed = value.trim();
      if (!trimmed) return "";
      const candidate = /^(https?:)?\/\//i.test(trimmed) ? trimmed : "https://" + trimmed;
      const url = new URL(candidate);
      return url.href;
    }

    function drawPlaceholder() {
      resetCanvas(300);
      ctx.fillStyle = "#e5e7eb";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#9ca3af";
      ctx.font = "16px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("QR Code 預覽", canvas.width / 2, canvas.height / 2);
      downloadBtn.disabled = true;
    }

    function drawQRCode(text, size, levelKey) {
      const qr = new QRCode(0, QRErrorCorrectLevel[levelKey]);
      qr.addData(text);
      qr.make();

      const modules = qr.modules;
      const count = qr.getModuleCount();
      const quiet = 4;
      const total = count + quiet * 2;
      const cell = size / total;

      resetCanvas(size);

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = "#000000";

      for (let row = 0; row < count; row++) {
        for (let col = 0; col < count; col++) {
          if (modules[row][col]) {
            const x = Math.round((col + quiet) * cell);
            const y = Math.round((row + quiet) * cell);
            const w = Math.ceil((col + quiet + 1) * cell) - x;
            const h = Math.ceil((row + quiet + 1) * cell) - y;
            ctx.fillRect(x, y, w, h);
          }
        }
      }

      downloadBtn.disabled = false;
    }

    function generateQRCode() {
      message.textContent = "";
      try {
        const normalized = normalizeUrl(urlInput.value);
        if (!normalized) {
          throw new Error("請先輸入網址。");
        }

        const size = parseInt(sizeSelect.value, 10);
        const levelKey = levelSelect.value;

        urlInput.value = normalized;
        drawQRCode(normalized, size, levelKey);
      } catch (err) {
        drawPlaceholder();
        message.textContent = err && err.message ? err.message : "未能產生 QR Code，請檢查網址格式。";
      }
    }

    function downloadPNG() {
      if (downloadBtn.disabled) return;
      const link = document.createElement("a");
      link.href = canvas.toDataURL("image/png");
      link.download = "qrcode.png";
      link.click();
    }

    function clearAll() {
      urlInput.value = "";
      message.textContent = "";
      drawPlaceholder();
      urlInput.focus();
    }

    generateBtn.addEventListener("click", generateQRCode);
    downloadBtn.addEventListener("click", downloadPNG);
    clearBtn.addEventListener("click", clearAll);
    urlInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        generateQRCode();
      }
    });

    drawPlaceholder();
  </script>
