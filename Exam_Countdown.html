<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>呈分試倒數器</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: linear-gradient(135deg, #eef6ff, #dfefff);
      color: #1f2d3d;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.12);
      padding: 32px 24px;
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      color: #0d47a1;
    }
    .subtitle {
      font-size: 1.1rem;
      margin-bottom: 24px;
      color: #44566c;
    }
    .now-time, .target-time {
      font-size: 1rem;
      margin: 8px 0;
    }
    .countdown {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .unit {
      background: #f4f9ff;
      border: 2px solid #d7e8ff;
      border-radius: 20px;
      padding: 20px 10px;
    }
    .number {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: bold;
      color: #1565c0;
      line-height: 1.1;
    }
    .label {
      margin-top: 8px;
      font-size: 1rem;
      color: #4b5f75;
    }
    .message {
      margin-top: 24px;
      font-size: 1.15rem;
      font-weight: bold;
      color: #d84315;
      min-height: 1.5em;
    }
    @media (max-width: 640px) {
      .countdown {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>呈分試倒數器</h1>
    <div class="subtitle">距離 6 月 4 日 08:30 還有：</div>

    <div class="now-time">現在時間：<span id="nowTime">--</span></div>
    <div class="target-time">目標時間：<span id="targetTime">6月4日 08:30</span></div>

    <div class="countdown">
      <div class="unit">
        <div class="number" id="days">0</div>
        <div class="label">日</div>
      </div>
      <div class="unit">
        <div class="number" id="hours">0</div>
        <div class="label">時</div>
      </div>
      <div class="unit">
        <div class="number" id="minutes">0</div>
        <div class="label">分</div>
      </div>
      <div class="unit">
        <div class="number" id="seconds">0</div>
        <div class="label">秒</div>
      </div>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function formatDateTime(date) {
      return `${date.getFullYear()}年${pad(date.getMonth() + 1)}月${pad(date.getDate())}日 ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
    }

    function getTargetDate() {
      const now = new Date();
      const year = now.getFullYear();
      let target = new Date(year, 5, 4, 8, 30, 0); // 月份 5 = 6月

      // 如果今年的 6/4 08:30 已過，就自動跳到下一年
      if (now > target) {
        target = new Date(year + 1, 5, 4, 8, 30, 0);
      }
      return target;
    }

    function updateCountdown() {
      const now = new Date();
      const target = getTargetDate();
      const diff = target - now;

      document.getElementById('nowTime').textContent = formatDateTime(now);
      document.getElementById('targetTime').textContent = `${target.getFullYear()}年06月04日 08:30:00`;

      if (diff <= 0) {
        document.getElementById('days').textContent = 0;
        document.getElementById('hours').textContent = 0;
        document.getElementById('minutes').textContent = 0;
        document.getElementById('seconds').textContent = 0;
        document.getElementById('message').textContent = '呈分試時間到了！';
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      document.getElementById('days').textContent = days;
      document.getElementById('hours').textContent = hours;
      document.getElementById('minutes').textContent = minutes;
      document.getElementById('seconds').textContent = seconds;
      document.getElementById('message').textContent = '';
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
